<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ตรวจสอบรายชื่อ</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
    button { touch-action: manipulation; }

    /* Navigation button */
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      text-decoration: none;
      width: 100%;
      justify-content: center;
    }
    .nav-btn-google {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5cbf 100%);
      color: #fff;
    }
    .nav-btn-google:hover {
      background: linear-gradient(135deg, #1765cc 0%, #0a4fa3 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(26,115,232,0.4);
    }
    .nav-btn-google:active {
      transform: scale(0.97);
    }
    .order-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      min-width: 86px;
      padding: 7px 12px;
      border: 2px solid #ef4444;
      border-radius: 10px;
      background: #fff;
      color: #dc2626;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(239,68,68,0.12);
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .order-btn:hover {
      background: #fef2f2;
      border-color: #dc2626;
      color: #b91c1c;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239,68,68,0.22);
    }
    .order-btn:active {
      transform: scale(0.97);
    }
    .nav-btn-loading {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
      color: #fff;
      pointer-events: none;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .nav-btn svg { flex-shrink: 0; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-3 md:py-10 md:px-4 bg-gray-100">

  <div class="w-full max-w-lg bg-white rounded-xl md:rounded-2xl shadow-xl overflow-hidden flex flex-col">
    <!-- Header -->
    <div class="bg-blue-700 p-6 text-center text-white shrink-0">
      <h1 class="text-xl md:text-2xl font-bold mb-1">ตรวจสอบรายชื่อ กปน.</h1>
      <p class="text-blue-200 text-xs flex justify-center items-center gap-1">
      </p>
    </div>

    <!-- Form -->
    <div id="searchFormArea" class="p-6 md:p-8 shrink-0 space-y-5">
      
      <!-- Input 1: ID Card with Mask -->
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="idCard">
          เลขบัตรประจำตัวประชาชน
        </label>
        <div class="relative">
          <input type="text" id="idCard" maxlength="17" inputmode="numeric"
                 class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg font-mono tracking-wide focus:outline-none focus:ring-2 focus:ring-blue-500 transition placeholder-gray-300"
                 placeholder="x-xxxx-xxxxx-xx-x"
                 oninput="formatIdCard(this)">
          <div class="absolute right-3 top-3.5 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
            </svg>
          </div>
        </div>
        <p class="text-[10px] text-gray-500 mt-1 pl-1">* ระบบจะใส่เครื่องหมายขีด (-) ให้อัตโนมัติ</p>
      </div>

      <!-- Input 2: First Name Only -->
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="nameInput">
          ชื่อจริง (ไม่ต้องระบุคำนำหน้าและนามสกุล)
        </label>
        <input type="text" id="nameInput" 
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
               placeholder="เช่น สมชาย">
        <p class="text-[10px] text-gray-500 mt-1 pl-1 text-blue-600">* กรอกเฉพาะชื่อจริง ไม่ต้องพิมพ์คำนำหน้าและนามสกุล</p>
      </div>

      <button onclick="searchData()" 
              id="searchBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 mt-2">
        <span>ตรวจสอบข้อมูล</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </button>

      <!-- Loading -->
      <div id="loading" class="hidden text-center py-4">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-200 border-t-blue-600"></div>
        <p class="text-gray-500 mt-2 text-sm">กำลังตรวจสอบความถูกต้อง...</p>
      </div>

      <!-- Message -->
      <div id="message" class="hidden p-4 rounded-lg text-center text-sm"></div>
    </div>

    <!-- Result -->
    <div id="resultArea" class="hidden bg-gray-50 border-t border-gray-200 p-6">
      <div id="resultList" class="space-y-4"></div>
      <button onclick="resetSearch()" 
              class="w-full mt-6 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3.5 px-6 rounded-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span>กลับไปหน้าค้นหา</span>
      </button>
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIG: อย่าลืมอัปเดต URL หลัง Deploy ใหม่
    // ==========================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxAgW8Bnu-2I_-G7cemaKAHqCrTFXohvkPkYjiAyTAe8_4zAqUqUAjj52BHh1AKfK-DcQ/exec'; 

    function formatIdCard(input) {
      let value = input.value.replace(/\D/g, '');
      if (value.length > 13) value = value.substring(0, 13);
      
      let formatted = '';
      if (value.length > 0) formatted += value.substring(0, 1);
      if (value.length > 1) formatted += '-' + value.substring(1, 5);
      if (value.length > 5) formatted += '-' + value.substring(5, 10);
      if (value.length > 10) formatted += '-' + value.substring(10, 12);
      if (value.length > 12) formatted += '-' + value.substring(12, 13);
      
      input.value = formatted;
    }

    async function searchData() {
      const idCardInput = document.getElementById('idCard');
      const nameInput = document.getElementById('nameInput');
      
      const idCardClean = idCardInput.value.replace(/[^0-9]/g, '');
      const nameVal = nameInput.value.trim();
      
      const btn = document.getElementById('searchBtn');
      const loading = document.getElementById('loading');
      const message = document.getElementById('message');
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');

      // Validation
      if (idCardClean.length !== 13) {
        showMessage('กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก', 'bg-red-50 text-red-600 border border-red-200');
        return;
      }
      if (nameVal.length < 2) {
        showMessage('กรุณากรอกชื่อจริงให้ถูกต้อง', 'bg-red-50 text-red-600 border border-red-200');
        return;
      }
      
      if (API_URL === 'PASTE_YOUR_NEW_WEB_APP_URL_HERE' || API_URL === '') {
        alert('กรุณาอัปเดต API_URL ในโค้ด');
        return;
      }

      // Reset & Loading
      message.classList.add('hidden');
      resultArea.classList.add('hidden');
      resultList.innerHTML = '';
      btn.disabled = true;
      btn.classList.add('opacity-50');
      loading.classList.remove('hidden');

      try {
        const url = `${API_URL}?idCard=${encodeURIComponent(idCardClean)}&name=${encodeURIComponent(nameVal)}`;
        const response = await fetch(url);
        
        if (!response.ok) throw new Error('Network response was not ok');
        
        const jsonData = await response.json();

        if (jsonData.status) {
          displayResults(jsonData.data);
          // เคลียร์ค่า input
          idCardInput.value = '';
          nameInput.value = '';
        } else {
          showMessage('ไม่พบข้อมูล หรือ ชื่อไม่ตรงกับเลขบัตร', 'bg-yellow-50 text-yellow-700 border border-yellow-200');
        }

      } catch (error) {
        console.error(error);
        showMessage('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'bg-red-50 text-red-600');
      } finally {
        loading.classList.add('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-50');
      }
    }

    function displayResults(data) {
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');
      
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-white rounded-lg shadow-sm border border-blue-100 p-4 relative overflow-hidden';
        
        const sideBar = document.createElement('div');
        sideBar.className = 'absolute left-0 top-0 bottom-0 w-1.5 bg-blue-500';
        div.appendChild(sideBar);

        // ปุ่มเปิด MapLink ของหน่วยเลือกตั้ง
        // ถ้ามี mapUrl → ใช้ link นั้นเลย
        // ถ้าไม่มี → fallback ค้นด้วยชื่อสถานที่ใน Google Maps
        const mapHref = (item.mapUrl && item.mapUrl.trim() !== '')
          ? item.mapUrl
          : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.location)}`;
        const mapBtn = `
          <a href="${mapHref}" target="_blank" rel="noopener" class="nav-btn nav-btn-google">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            นำทางสถานที่เลือกตั้ง
          </a>`;
        const orderHref = (item.orderUrl && item.orderUrl.trim() !== '')
          ? item.orderUrl.trim()
          : '';
        const orderBtn = orderHref
          ? `<a href="${orderHref}" target="_blank" rel="noopener" class="order-btn">ดูคำสั่ง</a>`
          : '';

        div.innerHTML += `
          <div class="pl-3">
            <div class="flex items-start justify-between gap-3 mb-2">
              <div class="min-w-0">
                <h3 class="font-bold text-lg text-gray-800 leading-snug">${item.fullName}</h3>
                <p class="text-sm text-blue-600 font-medium">${item.position}</p>
              </div>
              ${orderBtn}
            </div>
            
            <div class="text-sm text-gray-600 space-y-1 bg-gray-50 p-3 rounded-lg">
              <div class="flex justify-between">
                <span>หน่วยที่:</span>
                <span class="font-semibold text-gray-900">${item.stationNumber}</span>
              </div>
              <div class="flex justify-between">
                <span>แขวง:</span>
                <span class="font-semibold text-gray-900">${item.subDistrict}</span>
              </div>
              <div class="pt-2 mt-2 border-t border-gray-200">
                <span class="block text-xs text-gray-500 mb-1">สถานที่เลือกตั้ง:</span>
                <span class="font-medium text-gray-800">${item.location}</span>
                ${mapBtn}
              </div>
              <div class="pt-3 mt-3 border-t border-gray-200">
                <span class="block text-xs text-blue-600 mb-1">สถานที่อบรม:</span>
                <span class="font-medium text-blue-800">หอประชุม มหาวิทยาลัยเทคโนโลยีราชมงคลกรุงเทพ ศูนย์บพิตรพิมุข มหาเมฆ เขตสาทร</span>
                <a href="https://maps.app.goo.gl/7arDNJXd5kgTDWMp8" target="_blank" rel="noopener" class="nav-btn nav-btn-google">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                  นำทางสถานที่อบรม
                </a>
              </div>
            </div>
          </div>
        `;
        resultList.appendChild(div);
      });
      resultArea.classList.remove('hidden');
      document.getElementById('searchFormArea').classList.add('hidden');
    }

    function showMessage(text, classes) {
      const msg = document.getElementById('message');
      msg.className = `p-4 rounded-lg text-center text-sm ${classes}`;
      msg.innerHTML = text;
      msg.classList.remove('hidden');
    }


    function resetSearch() {
      document.getElementById('resultArea').classList.add('hidden');
      document.getElementById('searchFormArea').classList.remove('hidden');
      document.getElementById('resultList').innerHTML = '';
      document.getElementById('message').classList.add('hidden');
    }
  </script>
</body>
</html>
