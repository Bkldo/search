<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ตรวจสอบรายชื่อ</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; }
    button { touch-action: manipulation; }

    /* Navigation button */
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      text-decoration: none;
      width: 100%;
      justify-content: center;
    }
    .nav-btn-google {
      background: linear-gradient(135deg, #1a73e8 0%, #0d5cbf 100%);
      color: #fff;
    }
    .nav-btn-google:hover {
      background: linear-gradient(135deg, #1765cc 0%, #0a4fa3 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(26,115,232,0.4);
    }
    .nav-btn-google:active {
      transform: scale(0.97);
    }
    .nav-btn-loading {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
      color: #fff;
      pointer-events: none;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .nav-btn svg { flex-shrink: 0; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-3 md:py-10 md:px-4 bg-gray-100">

  <div class="w-full max-w-lg bg-white rounded-xl md:rounded-2xl shadow-xl overflow-hidden flex flex-col">
    <!-- Header -->
    <div class="bg-blue-700 p-6 text-center text-white shrink-0">
      <h1 class="text-xl md:text-2xl font-bold mb-1">ตรวจสอบรายชื่อ กปน.</h1>
      <p class="text-blue-200 text-xs flex justify-center items-center gap-1">
      </p>
    </div>

    <!-- Form -->
    <div class="p-6 md:p-8 shrink-0 space-y-5">
      
      <!-- Input 1: ID Card with Mask -->
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="idCard">
          เลขบัตรประจำตัวประชาชน
        </label>
        <div class="relative">
          <input type="text" id="idCard" maxlength="17" inputmode="numeric"
                 class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg font-mono tracking-wide focus:outline-none focus:ring-2 focus:ring-blue-500 transition placeholder-gray-300"
                 placeholder="x-xxxx-xxxxx-xx-x"
                 oninput="formatIdCard(this)">
          <div class="absolute right-3 top-3.5 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
            </svg>
          </div>
        </div>
        <p class="text-[10px] text-gray-500 mt-1 pl-1">* ระบบจะใส่เครื่องหมายขีด (-) ให้อัตโนมัติ</p>
      </div>

      <!-- Input 2: First Name Only -->
      <div>
        <label class="block text-gray-700 text-sm font-bold mb-2" for="nameInput">
          ชื่อจริง (ไม่ต้องระบุนามสกุล)
        </label>
        <input type="text" id="nameInput" 
               class="w-full border border-gray-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
               placeholder="เช่น สมชาย">
        <p class="text-[10px] text-gray-500 mt-1 pl-1 text-blue-600">* กรอกเฉพาะชื่อจริง ไม่ต้องพิมพ์นามสกุล</p>
      </div>

      <button onclick="searchData()" 
              id="searchBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-lg shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 mt-2">
        <span>ตรวจสอบข้อมูล</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </button>

      <!-- Loading -->
      <div id="loading" class="hidden text-center py-4">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-200 border-t-blue-600"></div>
        <p class="text-gray-500 mt-2 text-sm">กำลังตรวจสอบความถูกต้อง...</p>
      </div>

      <!-- Message -->
      <div id="message" class="hidden p-4 rounded-lg text-center text-sm"></div>
    </div>

    <!-- Result -->
    <div id="resultArea" class="hidden bg-gray-50 border-t border-gray-200 p-6">
      <div id="resultList" class="space-y-4"></div>
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIG: อย่าลืมอัปเดต URL หลัง Deploy ใหม่
    // ==========================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxAgW8Bnu-2I_-G7cemaKAHqCrTFXohvkPkYjiAyTAe8_4zAqUqUAjj52BHh1AKfK-DcQ/exec'; 

    function formatIdCard(input) {
      let value = input.value.replace(/\D/g, '');
      if (value.length > 13) value = value.substring(0, 13);
      
      let formatted = '';
      if (value.length > 0) formatted += value.substring(0, 1);
      if (value.length > 1) formatted += '-' + value.substring(1, 5);
      if (value.length > 5) formatted += '-' + value.substring(5, 10);
      if (value.length > 10) formatted += '-' + value.substring(10, 12);
      if (value.length > 12) formatted += '-' + value.substring(12, 13);
      
      input.value = formatted;
    }

    async function searchData() {
      const idCardInput = document.getElementById('idCard');
      const nameInput = document.getElementById('nameInput');
      
      const idCardClean = idCardInput.value.replace(/[^0-9]/g, '');
      const nameVal = nameInput.value.trim();
      
      const btn = document.getElementById('searchBtn');
      const loading = document.getElementById('loading');
      const message = document.getElementById('message');
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');

      // Validation
      if (idCardClean.length !== 13) {
        showMessage('กรุณากรอกเลขบัตรประชาชนให้ครบ 13 หลัก', 'bg-red-50 text-red-600 border border-red-200');
        return;
      }
      if (nameVal.length < 2) {
        showMessage('กรุณากรอกชื่อจริงให้ถูกต้อง', 'bg-red-50 text-red-600 border border-red-200');
        return;
      }
      
      if (API_URL === 'PASTE_YOUR_NEW_WEB_APP_URL_HERE' || API_URL === '') {
        alert('กรุณาอัปเดต API_URL ในโค้ด');
        return;
      }

      // Reset & Loading
      message.classList.add('hidden');
      resultArea.classList.add('hidden');
      resultList.innerHTML = '';
      btn.disabled = true;
      btn.classList.add('opacity-50');
      loading.classList.remove('hidden');

      try {
        const url = `${API_URL}?idCard=${encodeURIComponent(idCardClean)}&name=${encodeURIComponent(nameVal)}`;
        const response = await fetch(url);
        
        if (!response.ok) throw new Error('Network response was not ok');
        
        const jsonData = await response.json();

        if (jsonData.status) {
          displayResults(jsonData.data);
          // เคลียร์ค่า input
          idCardInput.value = '';
          nameInput.value = '';
        } else {
          showMessage('ไม่พบข้อมูล หรือ ชื่อไม่ตรงกับเลขบัตร', 'bg-yellow-50 text-yellow-700 border border-yellow-200');
        }

      } catch (error) {
        console.error(error);
        showMessage('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'bg-red-50 text-red-600');
      } finally {
        loading.classList.add('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-50');
      }
    }

    function displayResults(data) {
      const resultArea = document.getElementById('resultArea');
      const resultList = document.getElementById('resultList');
      
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-white rounded-lg shadow-sm border border-blue-100 p-4 relative overflow-hidden';
        
        const sideBar = document.createElement('div');
        sideBar.className = 'absolute left-0 top-0 bottom-0 w-1.5 bg-blue-500';
        div.appendChild(sideBar);

        // Build navigation button
        const destParam = encodeURIComponent(item.location);
        const hasMapUrl   = item.mapUrl && item.mapUrl.trim() !== '';
        // Extract lat,lng from Google Maps URL if present
        let destCoords = '';
        if (hasMapUrl) {
          const coordMatch = item.mapUrl.match(/@(-?[\d.]+),(-?[\d.]+)/);
          if (coordMatch) destCoords = `${coordMatch[1]},${coordMatch[2]}`;
        }
        const navId = `navBtn_${Math.random().toString(36).substr(2,8)}`;
        const mapBtn = `
          <button
            id="${navId}"
            class="nav-btn nav-btn-google"
            onclick="openNavigation(this, '${destCoords}', '${destParam}', '${hasMapUrl ? item.mapUrl.replace(/'/g,"&#39;") : ''}')">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
            </svg>
            นำทางไปสถานที่
          </button>`;

        div.innerHTML += `
          <div class="pl-3">
            <h3 class="font-bold text-lg text-gray-800">${item.fullName}</h3>
            <p class="text-sm text-blue-600 font-medium mb-2">${item.position}</p>
            
            <div class="text-sm text-gray-600 space-y-1 bg-gray-50 p-3 rounded-lg">
              <div class="flex justify-between">
                <span>หน่วยที่:</span>
                <span class="font-semibold text-gray-900">${item.stationNumber}</span>
              </div>
              <div class="flex justify-between">
                <span>แขวง:</span>
                <span class="font-semibold text-gray-900">${item.subDistrict}</span>
              </div>
              <div class="pt-2 mt-2 border-t border-gray-200">
                <span class="block text-xs text-gray-500 mb-1">สถานที่:</span>
                <span class="font-medium text-gray-800">${item.location}</span>
                ${mapBtn}
              </div>
            </div>
          </div>
        `;
        resultList.appendChild(div);
      });
      resultArea.classList.remove('hidden');
    }

    function showMessage(text, classes) {
      const msg = document.getElementById('message');
      msg.className = `p-4 rounded-lg text-center text-sm ${classes}`;
      msg.innerHTML = text;
      msg.classList.remove('hidden');
    }

    /**
     * openNavigation(btn, destCoords, destAddress, originalMapUrl)
     *
     * FIX: Mobile browsers block window.open() called from async callbacks.
     * Solution: open window.open() SYNCHRONOUSLY at the moment of click,
     * then update its location.href after GPS resolves.
     */
    function openNavigation(btn, destCoords, destAddress, originalMapUrl) {
      const originalHTML = btn.innerHTML;
      btn.className = 'nav-btn nav-btn-loading';
      btn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="animation:spin 1s linear infinite">
          <circle cx="12" cy="12" r="10" stroke-width="3" stroke-dasharray="40 20"/>
        </svg>
        กำลังระบุตำแหน่ง...`;

      function buildUrl(originLat, originLng) {
        const dest = destCoords ? destCoords : destAddress;
        if (originLat !== null) {
          // นำทางจากตำแหน่งปัจจุบัน → ปลายทาง
          return `https://www.google.com/maps/dir/${originLat},${originLng}/${dest}`;
        } else {
          // ไม่มีตำแหน่งต้นทาง → เปิดแค่ปลายทาง
          if (originalMapUrl) return originalMapUrl;
          return `https://www.google.com/maps/search/?api=1&query=${destAddress}`;
        }
      }

      function restoreBtn() {
        btn.className = 'nav-btn nav-btn-google';
        btn.innerHTML = originalHTML;
      }

      if (!navigator.geolocation) {
        // Browser ไม่รองรับ geolocation → เปิด Maps แบบไม่มีต้นทาง
        const url = buildUrl(null, null);
        restoreBtn();
        window.open(url, '_blank');
        return;
      }

      // ✅ KEY FIX: เปิด window ทันทีที่กดปุ่ม (synchronous = ไม่โดน popup blocker)
      // แล้วค่อยเปลี่ยน URL ของ window นั้นเมื่อได้ GPS
      const mapsWindow = window.open('', '_blank');

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const url = buildUrl(pos.coords.latitude, pos.coords.longitude);
          restoreBtn();
          if (mapsWindow && !mapsWindow.closed) {
            mapsWindow.location.href = url;
          } else {
            // กรณี window ถูกปิดไปแล้ว ลองเปิดใหม่
            window.open(url, '_blank');
          }
        },
        (err) => {
          console.warn('Geolocation error:', err.message);
          const url = buildUrl(null, null);
          restoreBtn();
          if (mapsWindow && !mapsWindow.closed) {
            mapsWindow.location.href = url;
          } else {
            window.open(url, '_blank');
          }
        },
        { timeout: 10000, maximumAge: 60000, enableHighAccuracy: true }
      );
    }
  </script>
</body>
</html>
